<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashley Davey Photography | Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="logo">ASHLEY DAVEY</div>
    <ul class="nav-links">
      <li><a href="index.html">Work</a></li>
      <li><a href="about.html">The Photographer</a></li>
      <li><a href="bts.html">Behind the Scenes</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main>
    <section class="page-hero">
      <h1>Get in Touch</h1>
      <p>Questions, bookings, or just saying hello — shoot me a message.</p>
    </section>

    <section class="content-section">
      <div class="contact-form-container">
        <p>Fill out the form below and I'll get back to you as soon as possible.</p>
        <form id="contactForm" class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" required></textarea>
          </div>
          <button type="submit" id="submitBtn">Send Message</button>
        </form>
        <div id="formStatus"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Ashley Davey Photography</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const formStatus = document.getElementById('formStatus');

      // Disable button while sending
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      formStatus.textContent = '';
      formStatus.style.color = '';

      const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        subject: document.getElementById('subject').value.trim(),
        message: document.getElementById('message').value.trim(),
      };

      try {
        const res = await fetch('/api/sendMail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (res.ok) {
          formStatus.textContent = data.message || 'Message sent successfully!';
          formStatus.style.color = 'green';
          document.getElementById('contactForm').reset();
        } else {
          formStatus.textContent = data.error || 'Something went wrong. Please try again.';
          formStatus.style.color = 'red';
        }
      } catch (err) {
        formStatus.textContent = 'Network error. Please check your connection and try again.';
        formStatus.style.color = 'red';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
